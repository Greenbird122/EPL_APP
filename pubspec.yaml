name: repair_ai
description: REPAIR-AI - Reproductive Early Pregnancy AI Response System for Maternal Health
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0

  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  flutter_native_splash: ^2.4.0
  smooth_page_indicator: ^1.2.0

  url_launcher: ^6.3.0
  shared_preferences: ^2.3.0
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/illustrations/
    - assets/icons/
    - assets/animations/
    - assets/svgs/
    - lib/localization/languages/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600

flutter_native_splash:
  color: "#6B4EFF"
  image: assets/illustrations/splash_logo.png
  android_12:
    image: assets/illustrations/splash_logo.png
    color: "#6B4EFF"
