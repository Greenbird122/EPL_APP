name: repair_ai
description: REPAIR-AI - Reproductive Early Pregnancy AI Response System for Maternal Health
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0

  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  flutter_native_splash: ^2.4.0
  smooth_page_indicator: ^1.2.0
  flutter_map: ^8.3.0

  geolocator: ^14.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.0
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.0
  video_player: ^2.9.0
  hive_flutter: ^1.1.0
  uuid: ^4.5.1
  record: ^6.1.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/illustrations/
    - assets/icons/
    - assets/videos/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf

flutter_native_splash:
  color: "#6B4EFF"
  image: assets/illustrations/splash_logo.png
  android_12:
    image: assets/illustrations/splash_logo.png
    color: "#6B4EFF"

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/icons/repair_ai_logo_splash.png
  adaptive_icon_background: "#6B4EFF"
  adaptive_icon_foreground: assets/icons/repair_ai_logo_splash.png
